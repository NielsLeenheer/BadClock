<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Auto-Rotating Clock</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
        }

        #clock-container {
            position: relative;
            width: min(90vmin, 1000px);
            height: min(90vmin, 1000px);
            overflow: hidden;
            border-radius: 50%;
            /* Removed transition - orientation changes should be instant */
        }


        /* Use full screen on localhost (Pi) */
        body.localhost #clock-container {
            width: 100vmin;
            height: 100vmin;
        }
        
        #clock {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transition: transform 0.35s ease-in-out;
            border-radius: 50%;
            background: #111111;
            box-shadow:
                0 0 60px rgba(0, 0, 0, 0.8),
                inset 0 0 40px rgba(0, 0, 0, 0.5);
            transition: box-shadow 0.3s;
        }

        /* Hide clock face on localhost (Pi) - just hands on black background */
        body.localhost #clock {
            background: transparent;
            box-shadow: none;
        }

        #clock.shake-mode {
            /* Shake mode active - no visual change to clock face */
        }

        .center-dot {
            position: absolute;
            width: 30px;
            height: 30px;
            background: #e74c3c;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 20px rgba(231, 76, 60, 0.8);
            z-index: 10;
        }

        .hand {
            position: absolute;
            background: linear-gradient(to top, #ecf0f1, #bdc3c7);
            border-radius: 10px;
            transform-origin: 50% 100%;
            cursor: grab;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
            transition: none;
        }

        /* Larger invisible touch target */
        .hand::before {
            content: '';
            position: absolute;
            left: -20px;
            right: -20px;
            top: 0;
            bottom: 0;
        }

        .hand:active {
            cursor: grabbing;
        }

        .hand.dragging {
            filter: brightness(1.3);
        }

        #hour-hand {
            width: 12px;
            height: 30%;
            left: 50%;
            top: 20%;
            transform: translateX(-50%);
            z-index: 1;
        }

        #minute-hand {
            width: 10px;
            height: 40%;
            left: 50%;
            top: 10%;
            transform: translateX(-50%);
            z-index: 2;
        }

        #second-hand {
            width: 4px;
            height: 45%;
            left: 50%;
            top: 5%;
            transform: translateX(-50%);
            background: #e74c3c;
            z-index: 3;
        }

        #debug-info {
            position: fixed;
            top: 44px; /* Below the toggle */
            left: 10px;
            color: #ecf0f1;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            z-index: 100;
            display: none; /* Hidden by default */
        }

        #debug-info.visible {
            display: block;
        }

        #debug-toggle {
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 101;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 12px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            user-select: none;
        }

        #debug-toggle input[type="checkbox"] {
            cursor: pointer;
            width: 16px;
            height: 16px;
        }

        #debug-toggle label {
            color: #ecf0f1;
            font-size: 14px;
            font-family: monospace;
            cursor: pointer;
            margin: 0;
        }

        #fullscreen-toggle {
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 102;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
        }

        #fullscreen-toggle:hover {
            background: rgba(0, 0, 0, 0.85);
        }

        #fullscreen-toggle span {
            color: #ecf0f1;
            font-size: 14px;
            font-family: monospace;
        }

        #debug-toggle {
            top: 54px !important; /* Below fullscreen button */
        }

        #debug-info {
            top: 98px !important; /* Below both buttons */
        }

        /* Manual controls panel */
        #manual-controls {
            position: fixed;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 5px;
            z-index: 100;
            opacity: 0.3;
            transition: opacity 0.3s;
            display: none; /* Hidden by default */
        }

        #manual-controls.visible {
            display: block;
        }

        #manual-controls:hover {
            opacity: 1;
        }

        #manual-controls.active {
            opacity: 1;
            border: 2px solid #e74c3c;
        }

        .angle-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
        }

        .angle-btn {
            background: rgba(52, 152, 219, 0.3);
            border: 1px solid #3498db;
            color: #ecf0f1;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            font-family: monospace;
            transition: all 0.2s;
        }

        .angle-btn:hover {
            background: rgba(52, 152, 219, 0.5);
            transform: scale(1.05);
        }

        .angle-btn:active {
            transform: scale(0.95);
        }

        .auto-btn {
            background: rgba(46, 204, 113, 0.3);
            border: 1px solid #2ecc71;
            color: #ecf0f1;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
            font-family: monospace;
            transition: all 0.2s;
            margin-top: 6px;
        }

        .auto-btn:hover {
            background: rgba(46, 204, 113, 0.5);
        }

        .random-btn {
            background: rgba(155, 89, 182, 0.3);
            border: 1px solid #9b59b6;
            color: #ecf0f1;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
            font-family: monospace;
            transition: all 0.2s;
            margin-top: 6px;
        }

        .random-btn:hover {
            background: rgba(155, 89, 182, 0.5);
        }

        .shake-btn {
            background: rgba(230, 126, 34, 0.3);
            border: 1px solid #e67e22;
            color: #ecf0f1;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
            font-family: monospace;
            transition: all 0.2s;
            margin-top: 6px;
        }

        .shake-btn:hover {
            background: rgba(230, 126, 34, 0.5);
        }

        .fullscreen-btn {
            background: rgba(52, 152, 219, 0.3);
            border: 1px solid #3498db;
            color: #ecf0f1;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
            font-family: monospace;
            transition: all 0.2s;
            margin-top: 6px;
        }

        .fullscreen-btn:hover {
            background: rgba(52, 152, 219, 0.5);
        }

        /* Debug horizon line */
        #horizon-line {
            position: absolute;
            width: 120%;
            height: 3px;
            background: rgba(231, 76, 60, 0.8);
            top: 75%;
            left: -10%;
            pointer-events: none;
            z-index: 5;
            box-shadow: 0 0 10px rgba(231, 76, 60, 0.6);
            display: none; /* Hidden by default */
            /* NO transform - stays fixed to clock face, rotates with it */
        }

        #horizon-line.visible {
            display: block;
        }

        /* ============ Digital Display ============ */
        #digital-display {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.35s ease-in-out;
            z-index: 1;
        }

        .digital-digits {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2%;
            width: 95%;
        }

        .digital-digit {
            flex: 0 0 19%;
            overflow: visible;
        }

        .digit-svg {
            width: 100%;
            height: auto;
            display: block;
            overflow: visible;
        }

        .segment {
            cursor: pointer;
            transition: fill 0.12s, opacity 0.12s;
        }

        .segment.on {
            fill: #ff1a1a;
            filter: url(#segment-glow);
        }

        .segment.off {
            fill: #1a1a1a;
        }

        .digital-colon {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 60px;
            flex: 0 0 5%;
        }

        .colon-dot {
            width: 26px;
            height: 26px;
            background: #ff1a1a;
            border-radius: 50%;
            box-shadow: 0 0 8px rgba(255, 26, 26, 0.8), 0 0 18px rgba(255, 26, 26, 0.4);
            animation: colon-blink 1s step-end infinite;
        }

        @keyframes colon-blink {
            0%   { opacity: 1; }
            85%  { opacity: 1; }
            85.1%{ opacity: 0; }
            100% { opacity: 0; }
        }

        .digital-digit.editing .segment.on {
            animation: seg-pulse 0.6s ease-in-out infinite alternate;
        }

        @keyframes seg-pulse {
            from { opacity: 0.65; }
            to   { opacity: 1; }
        }
    </style>
</head>
<body>
    <!-- Shared SVG filter for segment glow -->
    <svg style="position:absolute;width:0;height:0;pointer-events:none">
        <defs>
            <filter id="segment-glow" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
                <feMerge>
                    <feMergeNode in="blur"/>
                    <feMergeNode in="SourceGraphic"/>
                </feMerge>
            </filter>
        </defs>
    </svg>

    <div id="clock-container">
        <div id="clock">
            <div id="horizon-line"></div>
            <div id="hour-hand" class="hand"></div>
            <div id="minute-hand" class="hand"></div>
            <div id="second-hand" class="hand"></div>
            <div class="center-dot"></div>
        </div>
        <div id="digital-display"></div>
    </div>

    <div id="fullscreen-toggle">
        <span>⛶ Fullscreen</span>
    </div>

    <div id="debug-toggle">
        <input type="checkbox" id="debug-checkbox">
        <label for="debug-checkbox">Debug</label>
    </div>

    <div id="debug-info">
        <div id="time-display" style="font-size: 18px; font-weight: bold; margin-bottom: 5px;">00:00:00</div>
        <div id="orientation-info">
            Orientation: 0°<br>
            Accel: x:0 y:0 z:0<br>
            Time offset: +0m
        </div>
    </div>

    <!-- Manual orientation controls panel -->
    <div id="manual-controls">
        <div class="angle-buttons">
            <button class="angle-btn" data-angle="0">0°</button>
            <button class="angle-btn" data-angle="90">90°</button>
            <button class="angle-btn" data-angle="180">180°</button>
            <button class="angle-btn" data-angle="270">270°</button>
        </div>
        <button class="auto-btn">AUTO</button>
        <button class="random-btn">RANDOM</button>
        <button class="shake-btn">SHAKE</button>
    </div>

    <script>
        class Hand {
            constructor(element, gearRatio, gravityPhysics = {}) {
                this.element = element;
                this.gearRatio = gearRatio;
                this.angle = 0;
                this.velocity = 0;
                this.isDragging = false;
                this.lastAngle = 0;
                this.lastTime = Date.now();
                this.damping = 0.95;
                this.manuallySet = false;
                
                // Gravity mode physics - can be customized per hand
                this.gravityMode = false;
                this.gravityTargetAngle = 180; // Point down by default
                this.gravityVelocity = 0;
                this.gravityDamping = gravityPhysics.damping || 0.99; // Higher damping = faster settling
                this.springConstant = gravityPhysics.springConstant || 0.0025; // Very low spring = very slow movement
                this.impulseMultiplier = gravityPhysics.impulseMultiplier || 1.0; // How strongly hand responds to orientation changes
                
                this.setupTouch();
            }

            setupTouch() {
                const getAngleFromEvent = (e) => {
                    const touch = e.touches ? e.touches[0] : e;
                    const rect = this.element.parentElement.getBoundingClientRect();
                    const centerX = rect.left + rect.width / 2;
                    const centerY = rect.top + rect.height / 2;
                    const dx = touch.clientX - centerX;
                    const dy = touch.clientY - centerY;
                    return Math.atan2(dx, -dy) * (180 / Math.PI);
                };

                const startDrag = (e) => {
                    this.isDragging = true;
                    this.element.classList.add('dragging');
                    this.velocity = 0;
                    this.lastAngle = getAngleFromEvent(e);
                    this.lastTime = Date.now();
                    this.manuallySet = true;
                    
                    // Exit gravity mode when user drags a hand
                    if (this.gravityMode) {
                        this.exitCallback && this.exitCallback();
                    }
                    
                    e.preventDefault();
                };

                const drag = (e) => {
                    if (!this.isDragging) return;
                    
                    const currentAngle = getAngleFromEvent(e);
                    const currentTime = Date.now();
                    const deltaTime = currentTime - this.lastTime;
                    
                    if (deltaTime > 0) {
                        let deltaAngle = currentAngle - this.lastAngle;
                        
                        if (deltaAngle > 180) deltaAngle -= 360;
                        if (deltaAngle < -180) deltaAngle += 360;
                        
                        this.angle += deltaAngle;
                        this.velocity = deltaAngle / deltaTime * 16;
                        
                        this.lastAngle = currentAngle;
                        this.lastTime = currentTime;
                    }
                    
                    e.preventDefault();
                };

                const endDrag = (e) => {
                    if (!this.isDragging) return;
                    this.isDragging = false;
                    this.element.classList.remove('dragging');
                    e.preventDefault();
                };

                this.element.addEventListener('touchstart', startDrag);
                this.element.addEventListener('mousedown', startDrag);
                
                document.addEventListener('touchmove', drag);
                document.addEventListener('mousemove', drag);
                
                document.addEventListener('touchend', endDrag);
                document.addEventListener('mouseup', endDrag);
            }

            update() {
                if (this.gravityMode) {
                    // In gravity mode, hands hang down and swing
                    const diff = this.getAngleDifference(this.gravityTargetAngle, this.angle);
                    
                    // Spring force toward gravity (slower with lower spring constant)
                    const springForce = diff * this.springConstant;
                    this.gravityVelocity += springForce;
                    
                    // Apply velocity and damping
                    this.angle += this.gravityVelocity;
                    this.gravityVelocity *= this.gravityDamping;
                    
                    // Stop when settled
                    if (Math.abs(this.gravityVelocity) < 0.03 && Math.abs(diff) < 0.5) {
                        this.gravityVelocity = 0;
                        this.angle = this.gravityTargetAngle;
                        console.log(`Hand settled at ${this.angle.toFixed(1)}° (gravity target)`);
                    }
                } else if (!this.isDragging) {
                    // Normal inertia mode
                    this.angle += this.velocity;
                    this.velocity *= this.damping;
                    
                    if (Math.abs(this.velocity) < 0.01) {
                        this.velocity = 0;
                    }
                }
                
                // Normalize angle
                while (this.angle >= 360) this.angle -= 360;
                while (this.angle < 0) this.angle += 360;
                
                this.element.style.transform = `translateX(-50%) rotate(${this.angle}deg)`;
            }
            
            getAngleDifference(target, current) {
                let diff = target - current;
                while (diff > 180) diff -= 360;
                while (diff < -180) diff += 360;
                return diff;
            }
            
            enableGravityMode(gravityAngle) {
                this.gravityMode = true;
                this.gravityTargetAngle = gravityAngle;
                this.gravityVelocity = 0;
                this.velocity = 0;
            }
            
            disableGravityMode() {
                this.gravityMode = false;
                this.gravityVelocity = 0;
            }
            
            updateGravityTarget(gravityAngle) {
                // Simply update where gravity points (always 180° = screen bottom in clock space)
                if (this.gravityMode) {
                    this.gravityTargetAngle = gravityAngle;
                }
            }
            
            applyClockRotationInertia(rotationChange) {
                // When clock rotates, update hand position in new coordinate system
                if (this.gravityMode && Math.abs(rotationChange) > 1) {
                    console.log(`Clock rotated ${rotationChange.toFixed(1)}°, hand at ${this.angle.toFixed(1)}° in clock space`);

                    // Key concept: Hands stay pointing at screen bottom in world space
                    // When clock rotates, the coordinate system changes
                    // Hand angle in new clock space = old angle - rotationChange
                    // (If clock rotates -90° CCW, and hand was at 180°, it's now at 180 - (-90) = 270°)

                    this.angle -= rotationChange;

                    console.log(`  After coordinate change: hand now at ${this.angle.toFixed(1)}° in new clock space`);
                    console.log(`  Gravity at 180°, hand will fall naturally from ${this.angle.toFixed(1)}° to 180°`);

                    // Don't add any velocity - just let gravity pull the hand naturally
                    // The spring force in update() will do all the work
                }
            }
            
            setAngle(angle) {
                this.angle = angle;
            }

            getTime() {
                const normalized = ((this.angle % 360) + 360) % 360;
                return (normalized / 360) * this.gearRatio;
            }
        }

        class DigitalClock {
            constructor(container) {
                this.container = container;
                this.timeOffset = 0;
                this.digits = [];
                this.onTimeChange = null; // callback when time is edited

                // 7-segment polygon points (viewBox 0 0 57 100)
                this.SEG_PTS = {
                    a: '13,4  17,0  40,0  44,4  40,8  17,8',
                    b: '46,6  51,11 51,43 46,48 41,43 41,11',
                    c: '46,52 51,57 51,89 46,94 41,89 41,57',
                    d: '13,96 17,92 40,92 44,96 40,100 17,100',
                    e: '11,52 16,57 16,89 11,94  6,89  6,57',
                    f: '11,6  16,11 16,43 11,48  6,43  6,11',
                    g: '13,50 17,46 40,46 44,50 40,54 17,54',
                };

                // Which segments are on for each digit 0-9
                this.DIGIT_MAP = {
                    0: 'abcdef', 1: 'bc', 2: 'abdeg', 3: 'abcdg',
                    4: 'bcfg', 5: 'acdfg', 6: 'acdefg', 7: 'abc',
                    8: 'abcdefg', 9: 'abcdfg',
                };

                // Reverse lookup: segment-pattern → digit value
                this.PATTERN_TO_DIGIT = {};
                for (const [digit, segs] of Object.entries(this.DIGIT_MAP)) {
                    const key = 'abcdefg'.split('').map(s => segs.includes(s) ? '1' : '0').join('');
                    this.PATTERN_TO_DIGIT[key] = parseInt(digit);
                }

                this.buildDisplay();
            }

            /* ---- DOM construction ---- */

            buildDisplay() {
                const row = document.createElement('div');
                row.className = 'digital-digits';

                for (let i = 0; i < 4; i++) {
                    if (i === 2) {
                        const colon = document.createElement('div');
                        colon.className = 'digital-colon';
                        colon.innerHTML = '<div class="colon-dot"></div><div class="colon-dot"></div>';
                        row.appendChild(colon);
                    }
                    row.appendChild(this.buildDigit(i));
                }

                this.container.appendChild(row);
            }

            // Segment center points and whether horizontal (for hit detection)
            SEG_CENTERS = {
                a: { x: 28.5, y: 4,  hz: true },
                b: { x: 46,   y: 27, hz: false },
                c: { x: 46,   y: 73, hz: false },
                d: { x: 28.5, y: 96, hz: true },
                e: { x: 11,   y: 73, hz: false },
                f: { x: 11,   y: 27, hz: false },
                g: { x: 28.5, y: 50, hz: true },
            };

            buildDigit(index) {
                const wrap = document.createElement('div');
                wrap.className = 'digital-digit';
                wrap.dataset.index = index;

                const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                svg.setAttribute('viewBox', '0 0 57 100');
                svg.classList.add('digit-svg');

                const segments = {};
                for (const [name, pts] of Object.entries(this.SEG_PTS)) {
                    const poly = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
                    poly.setAttribute('points', pts);
                    poly.classList.add('segment', 'off');
                    poly.dataset.seg = name;
                    poly.dataset.digit = index;
                    poly.style.pointerEvents = 'none';

                    svg.appendChild(poly);
                    segments[name] = poly;
                }

                // Single click handler on the SVG - find nearest segment
                svg.addEventListener('click', (e) => {
                    const pt = svg.createSVGPoint();
                    pt.x = e.clientX;
                    pt.y = e.clientY;
                    const svgPt = pt.matrixTransform(svg.getScreenCTM().inverse());

                    let bestSeg = null;
                    let bestDist = Infinity;

                    for (const [name, center] of Object.entries(this.SEG_CENTERS)) {
                        const dx = svgPt.x - center.x;
                        const dy = svgPt.y - center.y;
                        // Horizontal segments get 0.6x distance (larger effective hit zone)
                        const scale = center.hz ? 0.6 : 1.0;
                        const dist = Math.sqrt(dx * dx + dy * dy) * scale;
                        if (dist < bestDist) {
                            bestDist = dist;
                            bestSeg = name;
                        }
                    }

                    if (bestSeg) {
                        this.onSegmentTap(index, bestSeg);
                    }
                });

                const digitState = {
                    el: wrap,
                    svg,
                    segments,
                    state: 'normal',   // 'normal' | 'editing' | 'error'
                    segOn: { a: false, b: false, c: false, d: false, e: false, f: false, g: false },
                    editTimeout: null,
                };
                this.digits.push(digitState);

                wrap.appendChild(svg);
                return wrap;
            }

            /* ---- Segment interaction ---- */

            onSegmentTap(di, segName) {
                const d = this.digits[di];

                // If in error mode, clear and start fresh edit
                if (d.state === 'error') {
                    d.el.classList.remove('error');
                    for (const s of 'abcdefg') d.segOn[s] = false;
                }

                d.state = 'editing';
                d.el.classList.add('editing');

                // Toggle the tapped segment
                d.segOn[segName] = !d.segOn[segName];
                this.renderDigit(di);

                // (Re)start 2-second edit timeout
                if (d.editTimeout) clearTimeout(d.editTimeout);
                d.editTimeout = setTimeout(() => this.finalizeEdit(di), 2000);
            }

            finalizeEdit(di) {
                const d = this.digits[di];
                d.editTimeout = null;
                d.el.classList.remove('editing');

                // Check if segments form a valid digit (0-9)
                const key = 'abcdefg'.split('').map(s => d.segOn[s] ? '1' : '0').join('');
                const value = this.PATTERN_TO_DIGIT[key];
                const allOff = key === '0000000';

                if (value !== undefined && this.isValidInContext(di, value)) {
                    // Valid digit AND valid in time context → apply
                    d.state = 'normal';
                    this.applyDigitValue(di, value);
                } else if (allOff) {
                    d.state = 'normal';
                } else {
                    // Not a digit, or digit not valid in this position → error
                    this.enterErrorMode(di);
                }
            }

            isValidInContext(di, value) {
                // Build prospective HH:MM with this digit changed
                const now = new Date(Date.now() + this.timeOffset);
                let h = now.getHours(), m = now.getMinutes();

                switch (di) {
                    case 0: h = value * 10 + (h % 10); break;
                    case 1: h = Math.floor(h / 10) * 10 + value; break;
                    case 2: m = value * 10 + (m % 10); break;
                    case 3: m = Math.floor(m / 10) * 10 + value; break;
                }

                return h <= 23 && m <= 59;
            }

            enterErrorMode(di) {
                const d = this.digits[di];
                let tick = 0;

                const iv = setInterval(() => {
                    if (tick >= 6) {
                        clearInterval(iv);
                        // All segments off
                        for (const s of 'abcdefg') d.segOn[s] = false;
                        d.state = 'error';
                        d.el.classList.add('error');
                        this.renderDigit(di);
                        return;
                    }

                    // Alternate visibility of currently-on segments
                    const show = tick % 2 === 0;
                    for (const [s, poly] of Object.entries(d.segments)) {
                        if (d.segOn[s]) {
                            poly.classList.toggle('on', show);
                            poly.classList.toggle('off', !show);
                        }
                    }
                    tick++;
                }, 130);
            }

            applyDigitValue(di, value) {
                const now = new Date(Date.now() + this.timeOffset);
                let h = now.getHours(), m = now.getMinutes();

                switch (di) {
                    case 0: h = value * 10 + (h % 10); break;
                    case 1: h = Math.floor(h / 10) * 10 + value; break;
                    case 2: m = value * 10 + (m % 10); break;
                    case 3: m = Math.floor(m / 10) * 10 + value; break;
                }

                const target = new Date(now);
                target.setHours(h, m, now.getSeconds(), now.getMilliseconds());
                this.timeOffset = target.getTime() - Date.now();

                if (this.onTimeChange) this.onTimeChange(this.timeOffset);
            }

            /* ---- Rendering ---- */

            renderDigit(di) {
                const d = this.digits[di];
                for (const [name, poly] of Object.entries(d.segments)) {
                    const on = d.segOn[name];
                    poly.classList.toggle('on', on);
                    poly.classList.toggle('off', !on);
                }
            }

            setDigitValue(di, value) {
                const d = this.digits[di];
                if (d.state !== 'normal') return; // don't overwrite editing/error

                const pattern = this.DIGIT_MAP[value] || '';
                for (const s of 'abcdefg') {
                    d.segOn[s] = pattern.includes(s);
                }
                this.renderDigit(di);
            }

            /* ---- Called every frame from Clock.animate ---- */

            update(timeOffset) {
                this.timeOffset = timeOffset;

                const now = new Date(Date.now() + timeOffset);
                const h = now.getHours(), m = now.getMinutes();

                const vals = [
                    Math.floor(h / 10), h % 10,
                    Math.floor(m / 10), m % 10,
                ];

                for (let i = 0; i < 4; i++) {
                    this.setDigitValue(i, vals[i]);
                }
            }
        }

        class Clock {
            constructor() {
                /*
                 * CLOCK FUNDAMENTALS:
                 *
                 * The clock has two modes:
                 *
                 * 1. CLOCK MODE (default):
                 *    - Hands are "connected" to the clock mechanism
                 *    - They operate as one with the clock face
                 *    - When orientation changes, hands immediately adapt (no lag/inertia)
                 *    - Hands show the current time

                 *    - Hands are "disconnected" from the clock mechanism
                 *    - They freely rotate around center pivot point
                 *    - Gravity pulls them toward screen bottom (lowest point)
                 *    - When orientation changes:
                 *      a) Clock face rotates to stay upright (12 at top, 6 at bottom)
                 *      b) Hands stay in world space (pointing at screen bottom)
                 *      c) This makes hands appear at different angles in clock space

                this.secondHand = new Hand(
                    document.getElementById('second-hand'),

                        springConstant: 0.003 * perfMultiplier,
                        damping: Math.pow(0.98, perfMultiplier),

                this.displayRotation = 0;
                this.previousDisplayRotation = 0; // Track for inertia calculations
                this.displayElement = document.getElementById('clock-container');
                this.clock = document.getElementById('clock');
                this.debugElement = document.getElementById('debug-info');
                this.horizonLine = document.getElementById('horizon-line');

                this.autoOrientation = 0;

                this.shakeMode = false;

                this.shakeThreshold = 2.0; // Acceleration change threshold
                this.shakeWindow = 500; // ms to check for shakes
                this.gravityAngle = 0; // Angle pointing down
                this.lastShakeDebug = 0; // For throttling debug output
                this.lastOrientationLog = 0; // For throttling orientation logs

                // Rotation dead zone + snap-to-90°
                this.sensorAngle = 0;          // raw angle from sensor (updated every frame)
                this.committedRotation = 0;    // the rotation we've committed to displaying
                this.DEAD_ZONE = 8;            // degrees of movement needed to start rotating
                this.SNAP_DISTANCE = 12;       // degrees from a 90° angle to snap
                this.SNAP_DELAY = 800;         // ms of stillness before snapping
                this.lastAngleChangeTime = 0;  // when the sensor angle last changed significantly
                
                console.log('Clock initialization:');
                console.log('  Protocol:', window.location.protocol);
                console.log('  Host:', window.location.host);
                console.log('  Secure context:', window.isSecureContext);
                console.log('  Generic Sensor API:', typeof RelativeOrientationSensor !== 'undefined' ? 'Available' : 'Not available');
                
                this.setCurrentTime();

            /* ---- Edge-swipe to switch modes ---- */

            setupSwipeDetection() {
                const EDGE = 44;      // px from edge to count as edge-touch
                const THRESHOLD = 80; // px inward travel to trigger
                let startLX = null;   // local (rotation-compensated) coords
                let startLY = null;
                let swiped = false;

                // Transform screen coords into clock-local coords
                // (undo the displayRotation so swipe is always horizontal relative to the clock face)
                const toLocal = (clientX, clientY) => {
                    const cx = window.innerWidth / 2;
                    const cy = window.innerHeight / 2;
                    const dx = clientX - cx;
                    const dy = clientY - cy;
                    const rad = -this.displayRotation * Math.PI / 180;
                    return {
                        x: cx + dx * Math.cos(rad) - dy * Math.sin(rad),
                        y: cy + dx * Math.sin(rad) + dy * Math.cos(rad),
                    };
                };

                const onStart = (e) => {
                    const t = e.touches ? e.touches[0] : e;
                    const local = toLocal(t.clientX, t.clientY);
                    if (local.x < EDGE || local.x > window.innerWidth - EDGE) {
                        startLX = local.x;
                        startLY = local.y;
                        swiped = false;
                    }
                };

                const onMove = (e) => {
                    if (startLX === null || swiped) return;
                    const t = e.touches ? e.touches[0] : e;
                    const local = toLocal(t.clientX, t.clientY);
                    const dx = local.x - startLX;
                    const dy = local.y - startLY;

                    if (Math.abs(dx) > THRESHOLD && Math.abs(dx) > Math.abs(dy) * 1.5) {
                        // Layout: [digital] [analog] — swipe left to go right, swipe right to go left
                        if (dx < 0 && this.currentMode === 'digital') {
                            swiped = true;
                            this.switchMode('analog');
                        } else if (dx > 0 && this.currentMode === 'analog') {
                            swiped = true;
                            this.switchMode('digital');
                        }
                    }
                };

                const onEnd = () => { startLX = null; };

                document.addEventListener('touchstart', onStart, { passive: true });
                document.addEventListener('touchmove', onMove, { passive: true });
                document.addEventListener('touchend', onEnd);
                document.addEventListener('mousedown', onStart);
                document.addEventListener('mousemove', onMove);
                document.addEventListener('mouseup', onEnd);
            }

            switchMode(newMode) {
                if (newMode === this.currentMode) return;

                const toAnalog = newMode === 'analog';
                const incoming = toAnalog ? this.analogDisplay : this.digitalDisplay;
                const outgoing = toAnalog ? this.digitalDisplay : this.analogDisplay;

                // Digital is left, analog is right
                const inFrom = toAnalog ? '100%' : '-100%';
                const outTo  = toAnalog ? '-100%' : '100%';

                // Place incoming off-screen instantly
                incoming.style.transition = 'none';
                incoming.style.transform = `translateX(${inFrom})`;
                incoming.offsetHeight; // force reflow

                // Animate both
                incoming.style.transition = 'transform 0.35s ease-in-out';
                outgoing.style.transition = 'transform 0.35s ease-in-out';
                incoming.style.transform = 'translateX(0)';
                outgoing.style.transform = `translateX(${outTo})`;

                this.currentMode = newMode;
                console.log(`Switched to ${newMode} mode`);
            }

            updateOrientationDisplay() {
                const orientationInfo = document.getElementById('orientation-info');
                if (orientationInfo) {
                    const offsetMinutes = Math.round(this.timeOffset / 60000);
                    const offsetSign = offsetMinutes >= 0 ? '+' : '';
                    const currentHTML = orientationInfo.innerHTML;
                    const lines = currentHTML.split('<br>');
                    
                    if (lines.length >= 3) {

            /* ---- Rotation with dead zone + snap-to-90° ---- */

            applyRotation(newAngle) {
                // Calculate difference from committed rotation (handle wraparound)
                let diff = newAngle - this.committedRotation;
                while (diff > 180) diff -= 360;
                while (diff < -180) diff += 360;

                if (Math.abs(diff) < this.DEAD_ZONE) {
                    // Inside dead zone - don't rotate yet
                    return;
                }

                // Commit the new rotation
                const rotationChange = diff;
                this.previousDisplayRotation = this.displayRotation;
                this.committedRotation = newAngle;
                this.displayRotation = newAngle;

                // Fast CSS transition for the jump
                this.displayElement.style.transition = 'transform 0.15s ease-out';
                this.displayElement.style.transform = `rotate(${this.displayRotation}deg)`;

                // Apply inertia to hands when clock rotates in shake mode
                if (this.shakeMode) {
                    this.hourHand.applyClockRotationInertia(rotationChange);
                    this.minuteHand.applyClockRotationInertia(rotationChange);
                    this.secondHand.applyClockRotationInertia(rotationChange);
                    this.gravityAngle = 180;
                    this.hourHand.updateGravityTarget(this.gravityAngle);
                    this.minuteHand.updateGravityTarget(this.gravityAngle);
                    this.secondHand.updateGravityTarget(this.gravityAngle);
                }
            }

            snapCheck() {
                // If sensor has been still for a while, snap to nearest 90°
                const elapsed = Date.now() - this.lastAngleChangeTime;
                if (elapsed < this.SNAP_DELAY) return;

                const nearest90 = Math.round(this.committedRotation / 90) * 90;
                let diff = nearest90 - this.committedRotation;
                while (diff > 180) diff -= 360;
                while (diff < -180) diff += 360;

                if (Math.abs(diff) > 0.5 && Math.abs(diff) <= this.SNAP_DISTANCE) {
                    this.committedRotation = nearest90;
                    this.displayRotation = nearest90;
                    this.displayElement.style.transition = 'transform 0.4s ease-in-out';
                    this.displayElement.style.transform = `rotate(${nearest90}deg)`;
                }
            }

            enterShakeMode() {
                console.log('🎲 Shake detected! Entering gravity mode...');
                this.shakeMode = true;
                this.accelHistory = []; // Clear history

                // Add visual indicator
                this.clock.classList.add('shake-mode');

                // Update horizon line visibility
                this.updateHorizonLineVisibility();

                // Calculate where world gravity (screen-down) points in clock coordinates
                // Since clock always rotates to stay upright (12 at top, 6 at bottom),
                // gravity always points to 6 o'clock (180° in clock space)
                let gravityAngle = 180;

                // Normalize to 0-360
                while (gravityAngle >= 360) gravityAngle -= 360;
                while (gravityAngle < 0) gravityAngle += 360;

                this.gravityAngle = gravityAngle;

                console.log(`🎯 Gravity points to 6 o'clock (${this.gravityAngle}° in clock space), displayRotation=${this.displayRotation}°`);
                
                // Enable gravity mode for all hands
                this.hourHand.enableGravityMode(this.gravityAngle);
                this.minuteHand.enableGravityMode(this.gravityAngle);
                this.secondHand.enableGravityMode(this.gravityAngle);
                
                // Set exit callback for when user drags any hand
                const exitCallback = () => this.exitShakeMode();
                this.hourHand.exitCallback = exitCallback;
                this.minuteHand.exitCallback = exitCallback;
                this.secondHand.exitCallback = exitCallback;
            }

            exitShakeMode() {
                console.log('👋 Hand dragged! Exiting gravity mode...');
                this.shakeMode = false;
                
                // Remove visual indicator
                this.clock.classList.remove('shake-mode');
                
                // Update horizon line visibility
                this.updateHorizonLineVisibility();
                
                // Disable gravity mode for all hands
                this.hourHand.disableGravityMode();
                this.minuteHand.disableGravityMode();
                this.secondHand.disableGravityMode();
                
                // Clear exit callbacks
                this.hourHand.exitCallback = null;
                this.minuteHand.exitCallback = null;
                this.secondHand.exitCallback = null;
                
                // Mark hands as manually set so clock continues from current positions
                // This prevents jumping back to original time
                this.hourHand.manuallySet = true;
                this.minuteHand.manuallySet = true;
                this.secondHand.manuallySet = true;
                
                // Reset velocities so hands don't coast
                this.hourHand.velocity = 0;
                this.minuteHand.velocity = 0;
                this.secondHand.velocity = 0;
                
                console.log('Clock will continue from current hand positions');
            }

            setCurrentTime() {
                const now = new Date();
                const hours = now.getHours() % 12;
                const minutes = now.getMinutes();
                const seconds = now.getSeconds();
                
                this.hourHand.setAngle((hours + minutes / 60) * 30);
                this.minuteHand.setAngle((minutes + seconds / 60) * 6);
                this.secondHand.setAngle(seconds * 6);
            }

            startOrientationPolling() {
                const eventSource = new EventSource('/orientation/stream');
                
                eventSource.onmessage = (event) => {
                    if (!this.manualMode) {
                        try {
                            const data = JSON.parse(event.data);
                            this.updateOrientation(data);
                        } catch (err) {
                            console.error('Error parsing orientation data:', err);
                        }
                    }
                };
                
                eventSource.onerror = (error) => {
                    console.error('SSE connection error:', error);
                    
                    if (eventSource.readyState === EventSource.CLOSED) {
                        console.log('SSE closed, falling back to Generic Sensor API...');
                        eventSource.close();
                        this.startGenericSensorAPI();
                    }
                };
                
                console.log('Connected to orientation SSE stream');
            }
            
            startGenericSensorAPI() {
                if (!window.isSecureContext) {
                    console.warn('Generic Sensor API fallback unavailable: requires HTTPS or localhost');
                    console.info('✓ No problem - using Pi Sensor Hat via SSE instead');
                    return;
                }

                if (typeof RelativeOrientationSensor === 'undefined') {
                    console.warn('Generic Sensor API not supported in this browser');
                    console.info('✓ No problem - using Pi Sensor Hat via SSE instead');
                    return;
                }
                
                console.log('Attempting Generic Sensor API fallback...');
                
                if (navigator.permissions && navigator.permissions.query) {
                    navigator.permissions.query({ name: 'accelerometer' })
                        .then(permissionStatus => {
                            console.log('Accelerometer permission:', permissionStatus.state);
                            
                            if (permissionStatus.state === 'denied') {
                                console.warn('Sensor permission denied - using Pi Sensor Hat via SSE instead');
                                return;
                            }
                            
                            this.startSensor();
                        })
                        .catch(err => {
                            console.warn('Permission query failed:', err.message);
                            this.startSensor();
                        });
                } else {
                    console.log('Permissions API not available, trying sensor directly');
                    this.startSensor();
                }
            }
            
            startSensor() {
                try {
                    // Try to start Accelerometer for shake detection (if available)
                    if (typeof Accelerometer !== 'undefined') {
                        try {
                            const accel = new Accelerometer({ frequency: 20 }); // 20Hz
                            
                            accel.addEventListener('reading', () => {
                                // Store real accelerometer data for shake detection
                                const accelData = {
                                    x: accel.x / 9.8,  // Convert to g units
                                    y: accel.y / 9.8,
                                    z: accel.z / 9.8,
                                    raw: true  // Mark as raw accelerometer data
                                };
                                
                                // Send to shake detection (but not orientation calculation)
                                this.handleAccelerometerData(accelData);
                            });
                            
                            accel.addEventListener('error', (event) => {
                                console.warn('Accelerometer error:', event.error.name);
                            });
                            
                            accel.start();
                            console.log('✓ Accelerometer active for shake detection');
                            this.accelerometer = accel;
                        } catch (error) {
                            console.warn('Accelerometer not available:', error.message);
                        }
                    }
                    
                    // Start RelativeOrientationSensor for display rotation
                    const options = { frequency: 10 };
                    const sensor = new RelativeOrientationSensor(options);
                    
                    sensor.addEventListener('reading', () => {
                        if (!this.manualMode) {
                            const [qx, qy, qz, qw] = sensor.quaternion;
                            
                            const sinr_cosp = 2 * (qw * qx + qy * qz);
                            const cosr_cosp = 1 - 2 * (qx * qx + qy * qy);
                            const roll = Math.atan2(sinr_cosp, cosr_cosp);
                            
                            const sinp = 2 * (qw * qy - qz * qx);
                            const pitch = Math.abs(sinp) >= 1 ? 
                                Math.sign(sinp) * Math.PI / 2 : 
                                Math.asin(sinp);
                            
                            const x = Math.sin(roll);
                            const y = Math.sin(pitch);
                            const z = Math.sqrt(Math.max(0, 1 - x*x - y*y));
                            
                            this.updateOrientation({ x, y, z });
                        }
                    });
                    
                    sensor.addEventListener('error', (event) => {
                        console.error('Sensor error:', event.error);
                        let errorMessage = 'Sensor error: ' + event.error.name;
                        
                        if (event.error.name === 'NotAllowedError') {
                            errorMessage = 'Permission denied. Please allow sensor access.';
                        } else if (event.error.name === 'NotReadableError') {
                            errorMessage = 'Sensor not readable. Check permissions or try HTTPS.';
                        } else if (event.error.name === 'NotFoundError') {
                            errorMessage = 'No orientation sensor found on device.';
                        }
                        
                        this.showSensorError(errorMessage);
                    });
                    
                    sensor.start();
                    console.log('✓ Generic Sensor API active (RelativeOrientationSensor)');
                    
                    this.orientationSensor = sensor;
                    
                } catch (error) {
                    console.error('Failed to start Generic Sensor API:', error);
                    
                    let errorMessage = 'Failed to start sensors: ' + error.message;
                    
                    if (error.name === 'SecurityError') {
                        errorMessage = 'Security error. Sensors require HTTPS or localhost.';
                    }
                    
                    this.showSensorError(errorMessage);
                }
            }
            
            handleAccelerometerData(data) {
                // Use real accelerometer data for shake detection
                // Only detect back-and-forth Z-axis motion (actual shaking)
                if (!this.manualMode && !this.shakeMode && this.currentMode === 'analog' && data.raw) {
                    const now = Date.now();

                    // Store Z-axis history only
                    this.accelHistory.push({ time: now, z: data.z });

                    // Remove old entries (600ms window)
                    this.accelHistory = this.accelHistory.filter(entry =>
                        now - entry.time < 600
                    );

                    // Detect Z-axis direction reversals (back-and-forth motion)
                    if (this.accelHistory.length > 6) {
                        let zDirectionReversals = 0;
                        let maxZChange = 0;
                        let prevZDiff = 0;

                        for (let i = 1; i < this.accelHistory.length; i++) {
                            const prev = this.accelHistory[i - 1];
                            const curr = this.accelHistory[i];

                            // Skip if either entry doesn't have z value
                            if (prev.z === undefined || curr.z === undefined) continue;

                            // Calculate Z-axis change (in g units: data.z / 9.8 was already done)
                            const zDiff = curr.z - prev.z;
                            maxZChange = Math.max(maxZChange, Math.abs(zDiff));

                            // Check if Z direction reversed (sign changed)
                            if (i > 1 && prevZDiff !== 0 && zDiff !== 0) {
                                // Both must be significant to count as reversal
                                // For raw accelerometer in m/s², use 2.0 threshold
                                if (Math.abs(prevZDiff) > 2.0 && Math.abs(zDiff) > 2.0) {
                                    // Check if signs are opposite (direction reversal)
                                    if ((prevZDiff > 0 && zDiff < 0) || (prevZDiff < 0 && zDiff > 0)) {
                                        zDirectionReversals++;
                                    }
                                }
                            }

                            prevZDiff = zDiff;
                        }

                        // Debug output
                        if (zDirectionReversals > 0 || maxZChange > 1.0) {
                            console.log(`[Accel Debug] Z-direction-reversals: ${zDirectionReversals} (thresh: 2), max Z-change: ${maxZChange.toFixed(1)} m/s²`);
                        }

                        // Trigger shake: need 2+ Z-axis direction reversals
                        if (zDirectionReversals >= 2) {
                            console.log(`🎲 Shake detected! (raw accelerometer: Z-direction-reversals=${zDirectionReversals})`);
                            this.enterShakeMode();
                        }
                    }
                }
            }
            
            showSensorError(message) {
                const orientationInfo = document.getElementById('orientation-info');
                if (orientationInfo) {
                    let suggestions = '';
                    
                    if (message.includes('permission') || message.includes('Permission')) {
                        suggestions = '<br><small>• Check browser permissions for motion sensors</small>';
                    } else if (message.includes('HTTPS') || message.includes('readable')) {
                        suggestions = '<br><small>• Requires HTTPS or localhost</small><br><small>• Current: ' + window.location.protocol + '//' + window.location.host + '</small>';
                    } else if (message.includes('not found') || message.includes('No orientation')) {
                        suggestions = '<br><small>• Device has no orientation sensor</small><br><small>• Use manual controls (top-right)</small>';
                    }

                    orientationInfo.innerHTML = `
                        <span style="color: #e74c3c;">${message}</span>${suggestions}<br>
                        <br>
                        Orientation: disabled<br>
                        Use manual controls →
                    `;
                }
                
                console.log('%c Sensor Status:', 'font-weight: bold', message);
            }

            updateOrientation(data) {
                const { x, y, z } = data;
                
                // Shake detection (only when not in manual mode, only in analog mode)
                if (!this.manualMode && !this.shakeMode && this.currentMode === 'analog') {
                    const now = Date.now();

                    // Store acceleration history (only Z-axis matters)
                    this.accelHistory.push({ time: now, z });

                    // Remove old entries (600ms window)
                    this.accelHistory = this.accelHistory.filter(entry =>
                        now - entry.time < 600
                    );

                    // Detect Z-axis direction reversals (back-and-forth motion)
                    if (this.accelHistory.length > 6) {
                        let zDirectionReversals = 0;
                        let maxZChange = 0;
                        let prevZDiff = 0;

                        for (let i = 1; i < this.accelHistory.length; i++) {
                            const prev = this.accelHistory[i - 1];
                            const curr = this.accelHistory[i];

                            // Calculate Z-axis change
                            const zDiff = curr.z - prev.z;
                            maxZChange = Math.max(maxZChange, Math.abs(zDiff));

                            // Check if Z direction reversed (sign changed)
                            if (i > 1 && prevZDiff !== 0 && zDiff !== 0) {
                                // Both must be significant (> 0.3g) to count as reversal
                                if (Math.abs(prevZDiff) > 0.3 && Math.abs(zDiff) > 0.3) {
                                    // Check if signs are opposite (direction reversal)
                                    if ((prevZDiff > 0 && zDiff < 0) || (prevZDiff < 0 && zDiff > 0)) {
                                        zDirectionReversals++;
                                    }
                                }
                            }

                            prevZDiff = zDiff;
                        }

                        // Debug logging every 500ms when there's significant motion
                        if (!this.lastShakeDebug || now - this.lastShakeDebug > 500) {
                            if (zDirectionReversals > 0 || maxZChange > 0.2) {
                                console.log(`[Shake Debug] Z-direction-reversals: ${zDirectionReversals} (thresh: 2), max Z-change: ${maxZChange.toFixed(2)}g`);
                                this.lastShakeDebug = now;
                            }
                        }

                        // Trigger shake: need 2+ Z-axis direction reversals (back-and-forth motion)
                        if (zDirectionReversals >= 2) {
                            console.log(`🎲 Shake detected! Z-direction-reversals: ${zDirectionReversals}`);
                            this.enterShakeMode();
                        }
                    }
                }
                
                // Calculate rotation angle (only log occasionally to reduce spam)
                const now = Date.now();
                const shouldLog = !this.lastOrientationLog || now - this.lastOrientationLog > 1000;
                
                if (shouldLog) {
                    console.log(`Raw accel: x=${x.toFixed(3)}, y=${y.toFixed(3)}, z=${z.toFixed(3)}`);
                    this.lastOrientationLog = now;
                }
                
                // Flip the coordinate system - when device is upright (y≈-1), we want angle≈0
                const angle = Math.atan2(-x, -y) * (180 / Math.PI);

                this.autoOrientation = angle;
                this.sensorAngle = angle;
                this.lastAngleChangeTime = Date.now();

                if (!this.manualMode) {
                    this.applyRotation(angle);
                }
                
                // Update orientation info
                const orientationInfo = document.getElementById('orientation-info');
                if (orientationInfo) {
                    const offsetMinutes = Math.round(this.timeOffset / 60000);
                    const offsetSign = offsetMinutes >= 0 ? '+' : '';
                    
                    let modeIndicator = '';
                    if (this.shakeMode) {
                        modeIndicator = ' <span style="color: #e74c3c;">[SHAKE]</span>';
                    } else if (this.manualMode) {
                        modeIndicator = ' (manual)';
                    }
                    
                    orientationInfo.innerHTML = `
                        Orientation: ${this.displayRotation}°${modeIndicator}<br>
                        Accel: x:${x.toFixed(2)} y:${y.toFixed(2)} z:${z.toFixed(2)}<br>
                        Time offset: ${offsetSign}${offsetMinutes}m
                    `;
                }
            }

            updateDisplay() {
                const displayTime = new Date(Date.now() + this.timeOffset);
                const hours = displayTime.getHours();
                const minutes = displayTime.getMinutes();
                const seconds = displayTime.getSeconds();
                
                const timeStr = `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
                const timeDisplay = document.getElementById('time-display');
                if (timeDisplay) {
                    timeDisplay.textContent = timeStr;
                }
                
                const orientationInfo = document.getElementById('orientation-info');
                if (orientationInfo) {
                    const offsetMinutes = Math.round(this.timeOffset / 60000);
                    const offsetSign = offsetMinutes >= 0 ? '+' : '';
                    
                    const currentHTML = orientationInfo.innerHTML;
                    const lines = currentHTML.split('<br>');
                    
                    if (lines.length >= 3) {
                        lines[2] = `Time offset: ${offsetSign}${offsetMinutes}m`;
                        orientationInfo.innerHTML = lines.join('<br>');
                    }
                }

                // Apply manual orientation if in manual mode
                if (this.manualMode) {
                    const newRotation = -this.manualOrientation;
                    const rotationChanged = newRotation !== this.displayRotation;
                    
                    if (rotationChanged) {
                        const rotationChange = newRotation - this.displayRotation;
                        this.previousDisplayRotation = this.displayRotation;
                        this.displayRotation = newRotation;
                        
                        this.displayElement.style.transform = `rotate(${this.displayRotation}deg)`;
                        this.updateOrientationDisplay();
                        
                        // Apply inertia to hands when clock rotates
                        if (this.shakeMode) {
                            console.log(`🔄 Clock rotated from ${this.previousDisplayRotation}° to ${this.displayRotation}° (change: ${rotationChange.toFixed(1)}°)`);

                            // Apply inertia to each hand
                            this.hourHand.applyClockRotationInertia(rotationChange);
                            this.minuteHand.applyClockRotationInertia(rotationChange);
                            this.secondHand.applyClockRotationInertia(rotationChange);

                            // Gravity stays at 180° (6 o'clock)
                            this.gravityAngle = 180;
                            
                            // Update gravity target (but no inertia from this since target doesn't change)
                            this.hourHand.updateGravityTarget(this.gravityAngle);
                            this.minuteHand.updateGravityTarget(this.gravityAngle);
                            this.secondHand.updateGravityTarget(this.gravityAngle);
                        }
                    } else {
                        this.displayElement.style.transform = `rotate(${this.displayRotation}deg)`;
                        this.updateOrientationDisplay();
                    }
                }
            }

            animate() {
                const currentTime = Date.now();
                const deltaTime = currentTime - this.lastUpdateTime;
                this.lastUpdateTime = currentTime;
                
                // Always update hand physics (inertia or gravity)
                this.hourHand.update();
                this.minuteHand.update();
                this.secondHand.update();

                // Snap to nearest 90° when static
                if (!this.manualMode) this.snapCheck();
                
                // Skip time updates when in shake mode
                if (this.shakeMode) {
                    this.updateDisplay();
                    if (this.digitalClock) this.digitalClock.update(this.timeOffset);
                    requestAnimationFrame(() => this.animate());
                    return;
                }
                
                // Normal clock operation (when not in shake mode)
                const hourMinuteCorrectionRate = (3 / 60);
                const secondCorrectionRate = (12 / 60);
                
                if ((this.hourHand.manuallySet || this.minuteHand.manuallySet || this.secondHand.manuallySet) &&
                    !this.hourHand.isDragging && !this.minuteHand.isDragging && !this.secondHand.isDragging &&
                    this.hourHand.velocity === 0 && this.minuteHand.velocity === 0 && this.secondHand.velocity === 0) {
                    
                    const setMinutes = (this.minuteHand.angle / 6);
                    const setSeconds = (this.secondHand.angle / 6);
                    const setHours = Math.floor(this.hourHand.angle / 30);
                    
                    const setTime = new Date();
                    setTime.setHours(Math.floor(setHours));
                    setTime.setMinutes(Math.floor(setMinutes));
                    setTime.setSeconds(Math.floor(setSeconds));
                    setTime.setMilliseconds(0);
                    
                    this.timeOffset = setTime.getTime() - currentTime;
                    
                    this.hourHand.manuallySet = false;
                    this.minuteHand.manuallySet = false;
                    this.secondHand.manuallySet = false;
                }
                
                const displayTime = new Date(currentTime + this.timeOffset);
                const hours = displayTime.getHours() % 12;
                const minutes = displayTime.getMinutes();
                const seconds = displayTime.getSeconds();
                const milliseconds = displayTime.getMilliseconds();
                
                const targetSecondAngle = (seconds + milliseconds / 1000) * 6;
                const targetMinuteAngle = (minutes + seconds / 60) * 6;
                const targetHourAngle = (hours + minutes / 60) * 30;
                
                if (!this.secondHand.isDragging && this.secondHand.velocity === 0) {
                    const diff = this.getAngleDifference(targetSecondAngle, this.secondHand.angle);
                    const correction = Math.sign(diff) * Math.min(Math.abs(diff), secondCorrectionRate);
                    this.secondHand.angle += correction;
                }
                
                if (!this.minuteHand.isDragging && this.minuteHand.velocity === 0) {
                    const diff = this.getAngleDifference(targetMinuteAngle, this.minuteHand.angle);
                    const correction = Math.sign(diff) * Math.min(Math.abs(diff), hourMinuteCorrectionRate);
                    this.minuteHand.angle += correction;
                }
                
                if (!this.hourHand.isDragging && this.hourHand.velocity === 0) {
                    const diff = this.getAngleDifference(targetHourAngle, this.hourHand.angle);
                    const correction = Math.sign(diff) * Math.min(Math.abs(diff), hourMinuteCorrectionRate);
                    this.hourHand.angle += correction;
                }
                
                this.updateDisplay();

                // Update digital clock every frame (it skips editing/error digits internally)
                if (this.digitalClock) {
                    this.digitalClock.update(this.timeOffset);
                }

                requestAnimationFrame(() => this.animate());
            }

            getAngleDifference(target, current) {
                let diff = target - current;
                while (diff > 180) diff -= 360;
                while (diff < -180) diff += 360;
                return diff;
            }
        }

        window.addEventListener('load', () => {
            new Clock();
        });
    </script>
